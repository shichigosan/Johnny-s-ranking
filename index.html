            text-align: left;

            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            gap: 14px;
        }

            width: 48%; 
            background: #ffffff; 
            border: 2px solid #ffe3ec; 
            border-radius: 16px; 
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .member-group { font-size: 12px; color: #888899; font-weight: bold; }
        .member-rate { font-size: 12px; color: #a09be7; font-weight: bold; margin-top: 4px;}

        .vote-row { display: flex; justify-content: space-between; gap: 14px; }
        .btn-vote {
            width: 48%; padding: 15px 0; border: none; border-radius: 30px;
            font-size: 15px; font-weight: bold; color: white; cursor: pointer;

            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            margin: 20px 0;
            background: #111122; 
            padding: 8px;
            border-radius: 16px;
            overflow: hidden;
        }

        }

            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #222;
            border-radius: 8px;
            cursor: pointer;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .grid-item.empty-slot {
            background: #222233;
            border: 2px dashed #ff527b;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .empty-text { color: #ff527b; font-size: 12px; font-weight: bold; }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.7) 100%);

            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            box-sizing: border-box;
            color: white;
            text-align: left;

        .grid-rank {

            font-weight: 900;

            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);

        .grid-name {
            font-size: 13px; font-weight: bold;

            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

</head>

  { id: 98, name: "川﨑星輝", group: "B&ZAI", image: "98.jpg", rate: 1500 },
  { id: 99, name: "稲葉通陽", group: "B&ZAI", image: "99.jpg", rate: 1500 },
  { id: 100, name: "永瀬廉", group: "King & Prince", image: "100.jpg", rate: 1500 },
  { id: 101, name: "髙橋海人", group: "King & Prince", image: "101.jpg", rate: 1500 },
  { id: 102, name: "赤西仁", group: "Solo", image: "102.jpg", rate: 1500 }
];

let totalRounds = 150; 
let currentRound = 0;
let leftIndex, rightIndex;
let historyLog = [];
let playedPairs = new Set();

// グリッチモード用の管理配列 (9枠分)
let glitchSlots = Array(9).fill(null);
let activeSlotIndex = null;

function startWithMode(mode) {
    if (mode === 'glitch') {
        document.getElementById("setup-zone").style.display = "none";
        document.getElementById("glitch-zone").style.display = "block";
        renderGlitchGrid();
    } else {
        // 通常対戦モード
        document.getElementById("setup-zone").style.display = "none";
        document.getElementById("game-zone").style.display = "block";
        totalRounds = (mode === 'endless') ? 250 : 150;
        document.getElementById("round-count").textContent = totalRounds + "回";
        nextMatch();
    }
}

/* ─── グリッチモード用の制御ロジック ─── */
function renderGlitchGrid() {
    let container = document.getElementById("glitch-grid-container");
    let html = "";
    for (let i = 0; i < 9; i++) {
        let member = glitchSlots[i];
        if (member) {
            let groupName = member.group ? member.group : "STARTO";
            html += `
                <div class="grid-item" onclick="openModal(${i})">
                    <img src="${member.image}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><rect width=\'100%\' height=\'100%\' fill=\'%23eeeeee\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'12\' fill=\'%23aaaaaa\'>No Image</text></svg>';">
                    <div class="grid-overlay">
                        <div class="grid-rank">#${i+1}</div>
                        <div class="grid-text-bottom">
                            <div class="grid-group">${groupName}</div>
                            <div class="grid-name">${member.name}</div>
                        </div>
                    </div>
                </div>`;
        } else {
            html += `
                <div class="grid-item empty-slot" onclick="openModal(${i})">
                    <div class="empty-text">#${i+1}<br>タップして選ぶ</div>
                </div>`;
        }
    }
    container.innerHTML = html;
}

function openModal(slotIndex) {
    activeSlotIndex = slotIndex;
    document.getElementById("modal-title").textContent = `#${slotIndex + 1} の顔を選ぶ`;
    
    let listContainer = document.getElementById("modal-list-container");
    let html = "";
    members.forEach(m => {
        html += `
            <div class="list-item" onclick="selectMemberForSlot(${m.id})">
                <img src="${m.image}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><rect width=\'100%\' height=\'100%\' fill=\'%23eeeeee\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'10\' fill=\'%23aaaaaa\'>No Image</text></svg>';">
                <div class="list-item-name">${m.name}</div>
            </div>`;
    });
    listContainer.innerHTML = html;
    document.getElementById("member-modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("member-modal").style.display = "none";
}

function selectMemberForSlot(memberId) {
    let selected = members.find(m => m.id === memberId);
    glitchSlots[activeSlotIndex] = selected;
    closeModal();
    renderGlitchGrid();
}

function finishGlitchMode() {
    document.getElementById("setup-zone").style.display = "none";
    document.getElementById("glitch-zone").style.display = "none";
    document.getElementById("result-zone").style.display = "block";

    let gridHtml = "";
    for (let i = 0; i < 9; i++) {
        let member = glitchSlots[i];
        let imgUrl = member ? member.image : ""; 
        let nameText = member ? member.name : "（未選択）";
        let groupName = member ? (member.group ? member.group : "STARTO") : "-";
        
        gridHtml += `
            <div class="grid-item">
                <img src="${imgUrl}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><rect width=\'100%\' height=\'100%\' fill=\'%23eeeeee\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'12\' fill=\'%23aaaaaa\'>No Image</text></svg>';">
                <div class="grid-overlay">
                    <div class="grid-rank">#${i+1}</div>
                    <div class="grid-text-bottom">
                        <div class="grid-group">${groupName}</div>
                        <div class="grid-name">${nameText}</div>
                    </div>
                </div>
            </div>`;
    }
    document.getElementById("grid-container").innerHTML = gridHtml;
}


/* ─── 通常・250回（Elo対戦）のロジック ─── */
function getCandidateIndices() {
    let borderRound = (totalRounds === 250) ? 180 : 100;
    if (currentRound >= borderRound) {
        let indexedMembers = members.map((m, idx) => ({ index: idx, rate: m.rate }));
        indexedMembers.sort((a, b) => b.rate - a.rate);
        return indexedMembers.slice(0, 30).map(m => m.index);
    }
    return members.map((_, idx) => idx);
}

function makePairKey(idx1, idx2) {
    let id1 = members[idx1].id; let id2 = members[idx2].id;
    return id1 < id2 ? `${id1}-${id2}` : `${id2}-${id1}`;
}

function pickValidPair(poolIndices) {
    for (let attempt = 0; attempt < 200; attempt++) {
        let idxL = poolIndices[Math.floor(Math.random() * poolIndices.length)];
        let leftRate = members[idxL].rate;
        let shuffled = poolIndices
            .filter(idx => idx !== idxL)
            .map(idx => ({ index: idx, diff: Math.abs(members[idx].rate - leftRate) }))
            .sort((a, b) => a.diff - b.diff);
            
        let matchPool = shuffled.slice(0, 10);
        if (matchPool.length === 0) continue;
        let idxR = matchPool[Math.floor(Math.random() * matchPool.length)].index;
        if (!playedPairs.has(makePairKey(idxL, idxR))) return { left: idxL, right: idxR };
    }
    let idxL = poolIndices[Math.floor(Math.random() * poolIndices.length)];
    let remaining = poolIndices.filter(idx => idx !== idxL);
    return { left: idxL, right: remaining[Math.floor(Math.random() * remaining.length)] };
}

function nextMatch() {
    if (currentRound >= totalRounds) { showResults(); return; }
    document.getElementById("round-count").textContent = (totalRounds - currentRound) + "回";
    document.getElementById("undo-btn").disabled = historyLog.length === 0;

    let poolIndices = getCandidateIndices();
    let pair = pickValidPair(poolIndices);
    leftIndex = pair.left; rightIndex = pair.right;

    document.getElementById("left-img").src = members[leftIndex].image;
    document.getElementById("left-name").textContent = members[leftIndex].name;
    document.getElementById("left-group").textContent = members[leftIndex].group ? members[leftIndex].group : "STARTO";
    document.getElementById("left-rate").textContent = "ELO " + members[leftIndex].rate;
    
    document.getElementById("right-img").src = members[rightIndex].image;
    document.getElementById("right-name").textContent = members[rightIndex].name;
    document.getElementById("right-group").textContent = members[rightIndex].group ? members[rightIndex].group : "STARTO";
    document.getElementById("right-rate").textContent = "ELO " + members[rightIndex].rate;
}

function vote(result, isSuper = false) {
    if(window.event) window.event.stopPropagation();
    let pairKey = makePairKey(leftIndex, rightIndex); playedPairs.add(pairKey);

    historyLog.push({
        leftIndex: leftIndex, rightIndex: rightIndex,
        leftOldRate: members[leftIndex].rate, rightOldRate: members[rightIndex].rate,
        wasSkipped: false, pairKey: pairKey
    });

    let leftMember = members[leftIndex]; let rightMember = members[rightIndex];
    let Ea = 1 / (1 + Math.pow(10, (rightMember.rate - leftMember.rate) / 400));
    let Eb = 1 / (1 + Math.pow(10, (leftMember.rate - rightMember.rate) / 400));
    let scoreA = result === 0 ? 1 : (result === 1 ? 0 : 0.5);
    let scoreB = result === 1 ? 1 : (result === 0 ? 0 : 0.5);

    let currentK = isSuper ? 64 : 32;
    leftMember.rate = Math.round(leftMember.rate + currentK * (scoreA - Ea));
    rightMember.rate = Math.round(rightMember.rate + currentK * (scoreB - Eb));

    currentRound++; nextMatch();
}

function skipMatch() {
    let pairKey = makePairKey(leftIndex, rightIndex); playedPairs.add(pairKey);
    historyLog.push({
        leftIndex: leftIndex, rightIndex: rightIndex,
        leftOldRate: members[leftIndex].rate, rightOldRate: members[rightIndex].rate,
        wasSkipped: true, pairKey: pairKey
    });
    nextMatch();
}

function undoMatch() {
    if (historyLog.length === 0) return;
    let previousState = historyLog.pop();
    leftIndex = previousState.leftIndex; rightIndex = previousState.rightIndex;
    members[leftIndex].rate = previousState.leftOldRate; members[rightIndex].rate = previousState.rightOldRate;
    if (previousState.pairKey) playedPairs.delete(previousState.pairKey);
    
    if (!previousState.wasSkipped) currentRound--;
    
    // 直前の状態をそのまま画面に再描画
    document.getElementById("round-count").textContent = (totalRounds - currentRound) + "回";
    document.getElementById("undo-btn").disabled = historyLog.length === 0;
    
    document.getElementById("left-img").src = members[leftIndex].image;
    document.getElementById("left-name").textContent = members[leftIndex].name;
    document.getElementById("left-group").textContent = members[leftIndex].group ? members[leftIndex].group : "STARTO";
    document.getElementById("left-rate").textContent = "ELO " + members[leftIndex].rate;
    
    document.getElementById("right-img").src = members[rightIndex].image;
    document.getElementById("right-name").textContent = members[rightIndex].name;
    document.getElementById("right-group").textContent = members[rightIndex].group ? members[rightIndex].group : "STARTO";
    document.getElementById("right-rate").textContent = "ELO " + members[rightIndex].rate;
}

function showResults() {
    document.getElementById("game-zone").style.display = "none";
    document.getElementById("result-zone").style.display = "block";
    let ranking = [...members].sort((a, b) => b.rate - a.rate);
    let gridHtml = "";
    for (let i = 0; i < Math.min(9, ranking.length); i++) {
        let groupName = ranking[i].group ? ranking[i].group : "STARTO";
        gridHtml += `
            <div class="grid-item">
                <img src="${ranking[i].image}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><rect width=\'100%\' height=\'100%\' fill=\'%23eeeeee\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'12\' fill=\'%23aaaaaa\'>No Image</text></svg>';">
                <div class="grid-overlay">
                    <div class="grid-rank">#${i+1}</div>
                    <div class="grid-text-bottom">
                        <div class="grid-group">${groupName}</div>
                        <div class="grid-name">${ranking[i].name}</div>
                    </div>
                </div>
            </div>`;
    }
    document.getElementById("grid-container").innerHTML = gridHtml;
}
</script>
